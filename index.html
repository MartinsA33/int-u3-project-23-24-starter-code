<!DOCTYPE html>
<html>
    <head>
        <title>Unit 3 Project Starter Code</title>
    </head>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
    
    <body>
        <!-- Add a title and edit the opening of your story. -->
        <div class="title"> Chud Life!! </div>
        <div class="story-opening">
            <h1 id="opening">Welcome you are now a chud.</h1>
            <p id="clickA">Click Anywhere in the box</p>
        </div>

        <!-- Change the text of the buttons to the options relevant to your story. -->
        <div class="buttons">
            <button class="option-one">Option 1</button>
            <button class="option-two">Option 2</button>
        </div>

        <!-- Put the part of the story the user will see if they picked option one. -->
        <div class="option-one-screen">
            <h1>You wake up 8 am, what do you do?</h1>
            <img src="https://www.nacd.org/wp-content/uploads/2018/06/making_your_bed.jpg">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/67/Scrolling_on_phone.jpg">
        </div>

        <!-- Put the part of the story the user will see if they picked option two. -->
        <div class="option-two-screen">
            <h1 id="context">1 PM Eat lunch</h1>
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT0qCtaPNtJAkCBf2Z-ZN3nAzZoAL6XarwJsA&s" id="img1">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/4d/Big_Mac.png" id="img2">
        </div>

        <!--Put the end of the story if the user chose option 1.-->
        <div class="option-one-end">
            <h1>Put final part of your story based on if they chosen option 1 at the beginning </h1>
            <img src="https://cdn.glitch.global/9d066a26-dbcb-4aa3-b1af-3cd59e251b0c/placeholder.jpeg?v=1657576139439">
        </div>

        <!-- Put the end of the story if the user chose option 2.-->
        <div class="option-two-end">
            <h1>Put final part of your story based on if they chosen option 2 at the beginning </h1>
            <img src="https://cdn.glitch.global/9d066a26-dbcb-4aa3-b1af-3cd59e251b0c/placeholder.jpeg?v=1657576139439">
        </div>
    </body>
</html>
